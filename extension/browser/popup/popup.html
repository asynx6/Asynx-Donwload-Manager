<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>AsynxDL — Confirm Download</title>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../assets/icons/icon48.png" alt="AsynxDL" class="logo">
      <h1>AsynxDL</h1>
    </div>
    <div id="content" class="content">
      <div class="file-row">
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div id="filename" class="filename">—</div>
          <div id="size" class="size">Unknown size</div>
        </div>
      </div>
      <div class="row">
        <span class="label">Save to</span>
        <div class="path-row">
          <span id="save-path" class="value">Downloads</span>
          <button id="browse-btn" class="btn-ghost">Browse</button>
        </div>
      </div>
      <div id="error" class="error"></div>
      <div class="actions">
        <button id="cancel-btn" class="btn-secondary">Cancel</button>
        <button id="start-btn" class="btn-primary">Start Download</button>
      </div>
    </div>
    <div id="success" class="success hidden">
      <div class="checkmark">✓</div>
      <p>Added to AsynxDL</p>
    </div>
    <div id="no-intercept" class="empty hidden">
      <p>No intercepted download found.</p>
      <button id="close-btn" class="btn-primary">Close</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
