<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsynxDL Extension — Options</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
      background: #f3f4f6;
      color: #111827;
      margin: 0;
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      padding: 28px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header img { width: 40px; height: 40px; }
    .header h1 { font-size: 20px; margin: 0; }
    .status {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      min-height: 18px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 8px;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #f3f4f6;
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <img src="../assets/icons/icon48.png" alt="AsynxDL">
      <h1>AsynxDL Extension</h1>
    </div>
    <div class="hint">
      The <strong>AsynxDL</strong> desktop app runs locally on your machine. No pairing token is required — the extension connects automatically.
    </div>
    <div id="status" class="status"></div>
    <div class="footer">
      The extension will intercept browser downloads and relay them to the AsynxDL desktop app.
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
